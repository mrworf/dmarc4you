# DMARC Analyzer configuration
# Copy to config.yaml or set DMARC_CONFIG env var to your file path.
# All options can be overridden via DMARC_* environment variables.

database:
  # Path to SQLite database file. Created if it does not exist.
  # Env: DMARC_DATABASE_PATH
  path: data/dmarc.db

log:
  # Log level: VERBOSE | INFO | WARN | ERROR
  # VERBOSE maps to Python DEBUG level.
  # Env: DMARC_LOG_LEVEL
  level: INFO

auth:
  # Secret key for signing session cookies. MUST be changed in production.
  # Generate with: python -c "import secrets; print(secrets.token_hex(32))"
  # Env: DMARC_SESSION_SECRET
  session_secret: change-me-in-production

  # Name of the session cookie.
  # Env: DMARC_SESSION_COOKIE
  session_cookie_name: dmarc_session

  # Session lifetime in days.
  # Env: DMARC_SESSION_MAX_AGE_DAYS
  session_max_age_days: 7

  # Mark session and CSRF cookies Secure when running behind HTTPS.
  # Env: DMARC_SESSION_COOKIE_SECURE
  session_cookie_secure: false

  # Session cookie SameSite policy.
  # Env: DMARC_SESSION_COOKIE_SAME_SITE
  session_cookie_same_site: lax

  # CSRF cookie SameSite policy.
  # Env: DMARC_CSRF_COOKIE_SAME_SITE
  csrf_cookie_same_site: strict

frontend:
  # Optional browser origin for the separate Next.js frontend.
  # Env: DMARC_FRONTEND_PUBLIC_ORIGIN
  public_origin: null

api:
  # Optional public URL for the FastAPI backend when the frontend is deployed separately.
  # Env: DMARC_API_PUBLIC_URL
  public_url: null

cors:
  # Optional allowlist for split-origin browser access.
  # Env: DMARC_CORS_ALLOWED_ORIGINS
  allowed_origins: []

archive:
  # Optional path to store raw report artifacts.
  # When set, ingested reports are archived to this directory.
  # Leave unset or null to disable artifact archival.
  # Env: DMARC_ARCHIVE_STORAGE_PATH
  storage_path: null

dns:
  # Optional override for recursive resolvers used for reverse DNS PTR lookups.
  # Leave empty to use the host default resolver configuration.
  # Env: DMARC_DNS_NAMESERVERS
  nameservers: []

  # Best-effort PTR timeout in seconds.
  # Env: DMARC_DNS_TIMEOUT_SECONDS
  timeout_seconds: 1.0

geoip:
  # Offline GeoIP provider: none | dbip-lite-country | maxmind-geolite2-country
  # Env: DMARC_GEOIP_PROVIDER
  provider: none

  # Local MMDB path for the configured provider.
  # Env: DMARC_GEOIP_DATABASE_PATH
  database_path: null
