services:
  proxy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    environment:
      DMARC_FRONTEND_HOST: ${DMARC_FRONTEND_HOST:-localhost}
      DMARC_API_HOST: ${DMARC_API_HOST:-api.localhost}
    ports:
      - "${DMARC_PROXY_HTTP_PORT:-80}:80"
      - "${DMARC_PROXY_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
