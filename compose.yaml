services:
  api:
    image: ghcr.io/${GHCR_OWNER:-ha}/dmarc4you-backend:${DMARC_IMAGE_TAG:-main}
    restart: unless-stopped
    env_file:
      - compose.env
    environment:
      DMARC_DATABASE_PATH: /app/data/dmarc.db
      DMARC_ARCHIVE_STORAGE_PATH: ${DMARC_ARCHIVE_STORAGE_PATH:-}
      DMARC_GEOIP_DATABASE_PATH: ${DMARC_GEOIP_DATABASE_PATH:-}
    ports:
      - "${DMARC_API_PORT:-8000}:8000"
    volumes:
      # Uncomment these bind mounts if you prefer host directories over named volumes.
      # - ./data:/app/data
      # - ./archive:/app/archive
      - dmarc_data:/app/data
      - dmarc_archive:/app/archive
      - ${DMARC_GEOIP_BIND_PATH:-./data/geoip}:/app/geoip:ro
    healthcheck:
      test:
        - CMD
        - /app/scripts/healthchecks/backend_ready.py
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    image: ghcr.io/${GHCR_OWNER:-ha}/dmarc4you-frontend:${DMARC_IMAGE_TAG:-main}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_CSRF_COOKIE_NAME: ${NEXT_PUBLIC_CSRF_COOKIE_NAME:-dmarc_csrf}
      NEXT_PUBLIC_REQUEST_ID_HEADER_NAME: ${NEXT_PUBLIC_REQUEST_ID_HEADER_NAME:-X-Request-ID}
    ports:
      - "${DMARC_WEB_PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD
        - /app/scripts/healthchecks/frontend_ready.mjs
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  imap:
    image: ghcr.io/${GHCR_OWNER:-ha}/dmarc4you-imap:${DMARC_IMAGE_TAG:-main}
    restart: unless-stopped
    profiles:
      - imap
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - compose.env
    environment:
      DMARC_IMAP_API_URL: ${DMARC_IMAP_API_URL:-http://api:8000}
      DMARC_IMAP_API_KEY: ${DMARC_IMAP_API_KEY:-}
      DMARC_IMAP_HOST: ${DMARC_IMAP_HOST:-}
      DMARC_IMAP_PORT: ${DMARC_IMAP_PORT:-993}
      DMARC_IMAP_USERNAME: ${DMARC_IMAP_USERNAME:-}
      DMARC_IMAP_PASSWORD: ${DMARC_IMAP_PASSWORD:-}
      DMARC_IMAP_MAILBOX: ${DMARC_IMAP_MAILBOX:-INBOX}
      DMARC_IMAP_POLL_SECONDS: ${DMARC_IMAP_POLL_SECONDS:-60}
      DMARC_IMAP_RESTART_ON_START: ${DMARC_IMAP_RESTART_ON_START:-false}
      DMARC_IMAP_DELETE_AFTER_DAYS: ${DMARC_IMAP_DELETE_AFTER_DAYS:--1}
      DMARC_IMAP_STATE_PATH: /app/state/imap-watch-state.db
      DMARC_IMAP_CONNECT_TIMEOUT_SECONDS: ${DMARC_IMAP_CONNECT_TIMEOUT_SECONDS:-30}
      DMARC_IMAP_JOB_TIMEOUT_SECONDS: ${DMARC_IMAP_JOB_TIMEOUT_SECONDS:-300}
    command:
      - python
      - -m
      - cli
      - imap-watch
    volumes:
      - dmarc_imap_state:/app/state

volumes:
  dmarc_data:
  dmarc_archive:
  dmarc_imap_state:
